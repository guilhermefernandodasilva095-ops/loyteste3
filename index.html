body{

.caixa{
    background: rgba(255,255,255,0.95);

    margin: auto;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);

.coracao{
    font-size: 50px;
    animation: pulsar 1.5s infinite;
}

@keyframes pulsar{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

h1{
    color:#e91e63;
    font-size:36px;
}

p{
    color:#555;
    font-size:20px;
}

img{
    width:300px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.25);
    transition:0.3s;
}

img:hover{
    transform:scale(1.05);
}

.foto-link{
    display:inline-block;
}
</style>
</head>
